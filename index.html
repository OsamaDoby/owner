<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doby Temp Mail</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
transition:.4s;
}

.dark{
background:#0f172a;
}

.container{

width:95%;
max-width:1000px;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);

padding:30px;
border-radius:20px;

box-shadow:0 25px 60px rgba(0,0,0,.35);

}

header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.logo{
font-size:26px;
font-weight:600;
}

.toggle{

background:white;
border:none;
padding:8px 18px;
border-radius:30px;
cursor:pointer;

}

.email-box{

display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;

}

input{

flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;

}

.btn{

border:none;
padding:12px 16px;
border-radius:10px;
cursor:pointer;
font-weight:600;
color:white;
position:relative;
overflow:hidden;
transition:.25s;

}

.btn:hover{
transform:translateY(-3px);
}

.copy{background:#22c55e;}
.refresh{background:#3b82f6;}
.delete{background:#ef4444;}

.timer{

font-size:14px;
margin-bottom:10px;

}

.inbox{

background:white;
color:black;
padding:15px;
border-radius:12px;

max-height:250px;
overflow:auto;

}

.dark .inbox{
background:#1e293b;
color:white;
}

.mail{

padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;

}

.mail:hover{
background:#f1f5f9;
}

.dark .mail:hover{
background:#334155;
}

.message{

margin-top:15px;

background:white;
color:black;

padding:15px;
border-radius:12px;
min-height:120px;

}

.dark .message{
background:#1e293b;
color:white;
}

footer{
margin-top:15px;
text-align:center;
font-size:12px;
opacity:.7;
}

/* ripple effect */

.btn span{

position:absolute;
background:rgba(255,255,255,.5);
border-radius:50%;
transform:scale(0);
animation:ripple .6s linear;

}

@keyframes ripple{

to{
transform:scale(4);
opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<header>

<div class="logo">📨 Doby Temp Mail</div>

<button class="toggle" onclick="toggleMode()">🌙</button>

</header>

<div class="email-box">

<input id="email" readonly>

<button class="btn copy" onclick="copyEmail(event)">📋</button>

<button class="btn refresh" onclick="loadInbox(event)">🔄</button>

<button class="btn delete" onclick="newEmail(event)">🗑️</button>

</div>

<div class="timer">
Email Age: <span id="age">0</span> sec
</div>

<div class="inbox" id="inbox">
No messages
</div>

<div class="message" id="message">
Select message to read
</div>

<footer>
Doby Temp Mail Service
</footer>

</div>

<script>

let email
let login
let domain
let startTime

const domains=[

"1secmail.com",
"1secmail.org",
"1secmail.net",
"wwjmp.com",
"esiix.com"

]

function generateEmail(){

login="doby"+Math.floor(Math.random()*999999)

domain=domains[Math.floor(Math.random()*domains.length)]

email=login+"@"+domain

startTime=Date.now()

localStorage.setItem("tempEmail",email)
localStorage.setItem("startTime",startTime)

}

function loadSaved(){

let saved=localStorage.getItem("tempEmail")

if(saved){

email=saved

login=email.split("@")[0]
domain=email.split("@")[1]

startTime=parseInt(localStorage.getItem("startTime"))

}else{

generateEmail()

}

document.getElementById("email").value=email

loadInbox()

}

function newEmail(e){

ripple(e)

generateEmail()

document.getElementById("email").value=email

loadInbox()

}

function copyEmail(e){

ripple(e)

navigator.clipboard.writeText(email)

alert("Email Copied")

}

function toggleMode(){

document.body.classList.toggle("dark")

}

function updateTimer(){

let sec=Math.floor((Date.now()-startTime)/1000)

document.getElementById("age").innerText=sec

}

async function loadInbox(e){

if(e) ripple(e)

let res=await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`)

let data=await res.json()

let box=document.getElementById("inbox")

box.innerHTML=""

if(data.length==0){

box.innerHTML="No messages"

return

}

data.forEach(m=>{

let div=document.createElement("div")

div.className="mail"

div.innerHTML="<b>"+m.from+"</b><br>"+m.subject

div.onclick=()=>readMail(m.id)

box.appendChild(div)

})

}

async function readMail(id){

let res=await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${login}&domain=${domain}&id=${id}`)

let mail=await res.json()

document.getElementById("message").innerHTML=`

<b>From:</b> ${mail.from}<br>
<b>Subject:</b> ${mail.subject}<hr>
${mail.textBody||mail.htmlBody}

`

}

function ripple(e){

const circle=document.createElement("span")

const diameter=Math.max(e.target.clientWidth,e.target.clientHeight)

circle.style.width=circle.style.height=diameter+"px"

circle.style.left=e.offsetX-diameter/2+"px"
circle.style.top=e.offsetY-diameter/2+"px"

e.target.appendChild(circle)

setTimeout(()=>circle.remove(),600)

}

loadSaved()

setInterval(loadInbox,5000)

setInterval(updateTimer,1000)

</script>

</body>
</html>
