<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doby Temp Mail | O S A M A</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --text: #ffffff;
        }

        [data-theme="light"] {
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.1);
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            --text: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; transition: all 0.3s ease; }

        body {
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* مؤثرات الخلفية المتحركة */
        .orb {
            position: fixed; width: 400px; height: 400px;
            background: var(--primary); filter: blur(120px);
            border-radius: 50%; opacity: 0.3; z-index: -1;
            animation: float 10s infinite alternate;
        }

        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(100px, 50px); } }

        header {
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; color: var(--primary); }

        .controls { display: flex; gap: 15px; }

        .btn-icon {
            background: var(--glass); border: 1px solid var(--glass-border);
            color: var(--text); padding: 10px; border-radius: 12px; cursor: pointer;
        }

        .container { max-width: 1000px; margin: 40px auto; width: 90%; flex: 1; }

        /* التصميم الزجاجي الرئيسي */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .email-box {
            background: rgba(0,0,0,0.1);
            border: 2px solid var(--primary);
            border-radius: 20px;
            margin: 30px 0;
            display: flex;
            align-items: center;
            overflow: hidden;
            direction: ltr;
        }

        .email-box input {
            flex: 1; background: transparent; border: none; padding: 20px;
            font-size: 1.4rem; color: var(--primary); font-weight: 800; text-align: center; width: 100%;
        }

        .copy-btn { background: var(--primary); color: white; border: none; padding: 20px 30px; font-size: 1.2rem; cursor: pointer; }
        .copy-btn:hover { filter: brightness(1.2); }

        /* منطقة التخصيص */
        .customization {
            display: grid;
            grid-template-columns: 2fr 1.5fr auto;
            gap: 15px;
            margin-bottom: 40px;
            direction: ltr;
        }

        .glass-input {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 15px; color: var(--text); outline: none;
        }

        select.glass-input { cursor: pointer; font-weight: bold; }

        /* قائمة الرسائل */
        .inbox-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .message-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; animation: fadeIn 0.5s ease; text-align: right;
        }
        .message-card:hover { border-color: var(--primary); transform: scale(1.02); }

        /* المودال (عرض الرسالة) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 25px; width: 90%; max-width: 700px;
            max-height: 80vh; overflow-y: auto; color: var(--text);
        }

        footer { padding: 40px; text-align: center; font-size: 0.9rem; opacity: 0.8; }
        .dev-tag { color: var(--accent); font-weight: 900; letter-spacing: 3px; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 50px; margin-left: 10px; }

        @media (max-width: 768px) {
            .customization { grid-template-columns: 1fr; }
            .email-box input { font-size: 1rem; }
        }
    </style>
</head>
<body data-theme="dark">

    <div class="orb"></div>
    <div class="orb" style="bottom: 0; right: 0; background: var(--accent); opacity: 0.2;"></div>

    <header>
        <div class="logo">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>Doby Temp Mail</span>
        </div>
        <div class="controls">
            <select id="langSwitch" class="btn-icon" onchange="updateLang()">
                <option value="ar">العربية</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>
            <button class="btn-icon" onclick="toggleTheme()"><i class="fa-solid fa-circle-half-stroke"></i></button>
        </div>
    </header>

    <div class="container">
        <div class="glass-card">
            <h1 id="txtTitle">توليد بريد ذكي</h1>
            <p id="txtSub" style="margin-bottom: 20px; opacity: 0.7;">احمِ بياناتك واستقبل رسائلك في ثوانٍ</p>

            <div class="email-box">
                <input type="text" id="emailField" readonly value="Loading...">
                <button class="copy-btn" onclick="copyAction()"><i class="fa-solid fa-copy"></i></button>
            </div>

            <div class="customization">
                <input type="text" id="userPart" class="glass-input" placeholder="Name / الاسم">
                <select id="domainPart" class="glass-input">
                    <option value="1secmail.com">@1secmail.com</option>
                    <option value="1secmail.org">@1secmail.org</option>
                    <option value="1secmail.net">@1secmail.net</option>
                </select>
                <button onclick="setCustomEmail()" class="copy-btn" style="border-radius: 15px;"><i class="fa-solid fa-check"></i></button>
            </div>

            <div class="inbox-header">
                <h2 id="txtInbox">الرسائل الواردة</h2>
                <button onclick="checkMessages()" class="btn-icon" style="color: var(--primary);"><i class="fa-solid fa-rotate"></i></button>
            </div>

            <div id="messagesContainer">
                <div style="padding: 40px; opacity: 0.5;">
                    <i class="fa-solid fa-envelope-open-text fa-3x"></i>
                    <p style="margin-top:15px">في انتظار وصول رسائل جديدة...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="msgModal" class="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalSubj" style="color: var(--primary);"></h2>
            <hr style="margin: 20px 0; opacity: 0.2;">
            <div id="modalBody" style="line-height: 1.6;"></div>
        </div>
    </div>

    <footer>
        <p>Built with Passion by <span class="dev-tag">O S A M A</span></p>
        <p style="margin-top: 10px;">&copy; 2026 Doby Temp Mail - Professional Privacy Service</p>
    </footer>

    <script>
        const API = "https://www.1secmail.com/api/v1/";
        let myEmail = localStorage.getItem('doby_mail') || "";

        const translations = {
            ar: { title: "توليد بريد ذكي", sub: "خدمة بريد مؤقتة احترافية وآمنة", inbox: "صندوق الوارد", copied: "تم النسخ!", wait: "جاري التحقق من الرسائل..." },
            en: { title: "Smart Mail Generator", sub: "Secure and professional temp mail service", inbox: "Inbox", copied: "Copied!", wait: "Checking for messages..." },
            fr: { title: "Générateur de Mail", sub: "Service de messagerie temporaire sécurisé", inbox: "Boîte de réception", copied: "Copié!", wait: "Vérification des messages..." }
        };

        // 1. تشغيل عند التحميل
        async function start() {
            if (!myEmail) {
                await fetchRandom();
            } else {
                document.getElementById('emailField').value = myEmail;
            }
            updateLang();
            checkMessages();
            setInterval(checkMessages, 8000); // تحديث آلي كل 8 ثواني
        }

        // 2. توليد إيميل عشوائي
        async function fetchRandom() {
            const res = await fetch(`${API}?action=genRandomMailbox&count=1`);
            const data = await res.json();
            myEmail = data[0];
            saveAndUI();
        }

        // 3. تعيين إيميل مخصص
        function setCustomEmail() {
            const user = document.getElementById('userPart').value.trim();
            const dom = document.getElementById('domainPart').value;
            if(!user) { alert("Please enter a name / يرجى إدخال اسم"); return; }
            myEmail = `${user}@${dom}`;
            saveAndUI();
        }

        function saveAndUI() {
            document.getElementById('emailField').value = myEmail;
            localStorage.setItem('doby_mail', myEmail);
            checkMessages();
        }

        // 4. جلب الرسائل
        async function checkMessages() {
            if(!myEmail.includes('@')) return;
            const [user, domain] = myEmail.split('@');
            try {
                const res = await fetch(`${API}?action=getMessagesList&login=${user}&domain=${domain}`);
                const list = await res.json();
                renderMessages(list);
            } catch (e) { console.log("API Error"); }
        }

        function renderMessages(msgs) {
            const container = document.getElementById('messagesContainer');
            if(msgs.length === 0) return;

            container.innerHTML = msgs.map(m => `
                <div class="message-card" onclick="openMsg(${m.id})">
                    <div style="text-align: right">
                        <strong style="color:var(--primary)">${m.from}</strong>
                        <div style="font-size: 0.85rem; opacity: 0.8">${m.subject}</div>
                    </div>
                    <div style="font-size: 0.8rem; opacity: 0.5">${m.date.split(' ')[1]}</div>
                </div>
            `).join('');
        }

        // 5. فتح الرسالة
        async function openMsg(id) {
            const [user, domain] = myEmail.split('@');
            const res = await fetch(`${API}?action=readMessage&login=${user}&domain=${domain}&id=${id}`);
            const data = await res.json();
            
            document.getElementById('modalSubj').innerText = data.subject;
            document.getElementById('modalBody').innerHTML = data.htmlBody || data.body;
            document.getElementById('msgModal').style.display = 'flex';
        }

        // 6. التحكم بالواجهة
        function copyAction() {
            navigator.clipboard.writeText(myEmail);
            const lang = document.getElementById('langSwitch').value;
            alert(translations[lang].copied);
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function updateLang() {
            const l = document.getElementById('langSwitch').value;
            document.getElementById('txtTitle').innerText = translations[l].title;
            document.getElementById('txtSub').innerText = translations[l].sub;
            document.getElementById('txtInbox').innerText = translations[l].inbox;
            
            document.documentElement.dir = (l === 'ar' ? 'rtl' : 'ltr');
            document.body.style.textAlign = (l === 'ar' ? 'right' : 'left');
        }

        start();
    </script>
</body>
</html>
