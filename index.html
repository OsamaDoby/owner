<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doby Cloud - سحابتك الشخصية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; }
        .logo-text { font-family: 'Arial Black', sans-serif; letter-spacing: -1px; }
        .drop-zone { border: 3px dashed #3b82f6; transition: 0.3s; background: white; }
        .drop-zone:hover { border-color: #1d4ed8; background-color: #eff6ff; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="bg-white shadow-md p-4">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-2 space-x-reverse">
                <div class="gradient-bg p-2 rounded-lg shadow-lg">
                    <i class="fas fa-cloud text-white text-2xl"></i>
                </div>
                <span class="text-3xl font-bold text-blue-900 logo-text ml-2">Doby<span class="text-blue-500">Cloud</span></span>
            </div>
            <div class="hidden md:block text-gray-500 text-sm italic">أسرع وسيلة لمشاركة ملفاتك</div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-2xl">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-8 text-center border-b border-gray-100">
                <h2 class="text-2xl font-bold text-gray-800">مرحباً بك في دوبي كلاود</h2>
                <p class="text-gray-500 mt-2">ارفع ملفاتك واحصل على رابط التحميل فوراً</p>
            </div>

            <div class="p-8">
                <div id="drop-zone" class="drop-zone rounded-2xl p-12 flex flex-col items-center cursor-pointer mb-6">
                    <div class="bg-blue-100 p-4 rounded-full mb-4">
                        <i class="fas fa-arrow-up text-3xl text-blue-600 animate-bounce"></i>
                    </div>
                    <p class="text-gray-600 font-medium">اسحب الملف هنا</p>
                    <p class="text-gray-400 text-xs mt-1">أو اضغط لتصفح جهازك</p>
                    <input type="file" id="file-input" class="hidden">
                </div>

                <div id="upload-status" class="hidden mb-6">
                    <div class="flex justify-between mb-2">
                        <span id="file-name-display" class="text-sm font-medium text-gray-600 truncate w-48"></span>
                        <span id="percent" class="text-sm font-bold text-blue-600">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <div id="result-area" class="hidden animate-fade-in">
                    <div class="bg-green-50 border border-green-200 rounded-xl p-4 flex items-center justify-between">
                        <div class="flex items-center">
                            <i class="fas fa-check-circle text-green-500 mr-2 ml-2"></i>
                            <span class="text-sm text-green-700">تم الرفع بنجاح!</span>
                        </div>
                        <button onclick="copyLink()" class="bg-green-600 text-white px-4 py-1 rounded-lg text-xs hover:bg-green-700">نسخ الرابط</button>
                    </div>
                    <input type="text" id="download-url" readonly class="w-full mt-3 p-2 bg-gray-100 border rounded-lg text-xs text-blue-600 outline-none">
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 text-center text-gray-500">
        <p>&copy; 2024 <b>Doby Cloud</b> - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        // --- إعدادات FIREBASE (استبدلها ببياناتك الخاصة) ---
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "doby-cloud.firebaseapp.com",
            projectId: "doby-cloud",
            storageBucket: "doby-cloud.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        // -----------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadStatus = document.getElementById('upload-status');
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const resultArea = document.getElementById('result-area');
        const downloadInput = document.getElementById('download-url');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => handleUpload(e.target.files[0]);

        function handleUpload(file) {
            if (!file) return;

            uploadStatus.classList.remove('hidden');
            resultArea.classList.add('hidden');
            document.getElementById('file-name-display').innerText = file.name;

            const storageRef = storage.ref('uploads/' + file.name);
            const uploadTask = storageRef.put(file);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    progressBar.style.width = progress + '%';
                    percentText.innerText = Math.round(progress) + '%';
                }, 
                (error) => { alert("خطأ في الرفع: " + error.message); }, 
                () => {
                    uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                        resultArea.classList.remove('hidden');
                        downloadInput.value = downloadURL;
                        uploadStatus.classList.add('hidden');
                    });
                }
            );
        }

        function copyLink() {
            downloadInput.select();
            document.execCommand("copy");
            alert("تم نسخ رابط التحميل!");
        }
    </script>
</body>
</html>
