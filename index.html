<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doby Chat | ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: 0.3s; }
        .dark { background-color: #0b141a; color: white; }
        .light { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #efeae2; color: #111b21; }
        .msg-bubble { max-width: 75%; padding: 8px 12px; margin-bottom: 8px; position: relative; font-size: 15px; }
        .msg-me { background-color: #005c4b; color: white; border-radius: 10px 0 10px 10px; align-self: flex-start; }
        .msg-them { background-color: #202c33; color: white; border-radius: 0 10px 10px 10px; align-self: flex-end; }
        .light .msg-me { background-color: #d9fdd3; color: #111b21; }
        .light .msg-them { background-color: #ffffff; color: #111b21; }
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="dark h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-[#111b21] p-4">
        <div class="bg-[#202c33] p-8 rounded-2xl shadow-2xl w-full max-w-md text-center border-t-4 border-emerald-500">
            <h1 class="text-3xl font-bold mb-2 text-white">Doby Chat ❤️</h1>
            <p class="text-gray-400 mb-6 italic">عالمكم الخاص الصغير</p>
            <input type="password" id="secret-code" placeholder="أدخل كود الدخول الخاص بك..." 
                   class="w-full p-4 rounded-xl bg-[#2a3942] text-white border-none mb-4 text-center focus:ring-2 ring-emerald-500 outline-none">
            <button onclick="login()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                دخول للدردشة
            </button>
            <p id="error-msg" class="text-red-400 mt-4 hidden text-sm">كود خاطئ! حاول مرة أخرى يا جميل.</p>
        </div>
    </div>

    <header class="p-3 flex justify-between items-center bg-[#202c33] shadow-lg z-10">
        <div class="flex items-center gap-3">
            <div id="user-avatar" class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center text-xl shadow-inner">👤</div>
            <div>
                <h2 id="user-display-name" class="font-bold text-sm">Doby Chat</h2>
                <span class="text-[10px] text-emerald-400 flex items-center gap-1">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> متصل الآن
                </span>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleLang()" id="lang-btn" class="text-xs bg-[#2a3942] px-3 py-1 rounded-full border border-gray-600">EN</button>
            <button onclick="toggleTheme()" class="p-2 bg-[#2a3942] rounded-full">🌓</button>
        </div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-2">
        </main>

    <footer class="p-3 bg-[#202c33] flex items-center gap-2">
        <input type="text" id="msg-input" placeholder="اكتب رسالة..." 
               class="flex-1 p-3 rounded-full bg-[#2a3942] text-white outline-none focus:ring-1 ring-emerald-500 text-sm">
        <button onclick="sendMsg()" class="bg-emerald-600 p-3 rounded-full w-12 h-12 flex items-center justify-center hover:bg-emerald-700 transition-transform active:scale-90 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-white">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
            </svg>
        </button>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // إعدادات مشروعك اللي انت بعتها
        const firebaseConfig = {
            apiKey: "AIzaSyAsQcdlGauMHmut0xOuVD6oDld-E9xVl2E",
            authDomain: "doby-chat.firebaseapp.com",
            databaseURL: "https://doby-chat-default-rtdb.firebaseio.com",
            projectId: "doby-chat",
            storageBucket: "doby-chat.firebasestorage.app",
            messagingSenderId: "995153459605",
            appId: "1:995153459605:web:47aada2c97ed95317f1e9c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = "";
        let currentLang = "ar";

        // أكواد الدخول (غيرها زي ما تحب)
        const users = {
            "1111": { name: "دوبي المبدع", avatar: "🤵" }, 
            "2222": { name: "دوبي الجميلة", avatar: "👰" }
        };

        function login() {
            const code = document.getElementById('secret-code').value;
            if (users[code]) {
                currentUser = users[code].name;
                document.getElementById('user-avatar').innerText = users[code].avatar;
                document.getElementById('user-display-name').innerText = currentUser;
                document.getElementById('login-screen').style.display = 'none';
                loadMessages();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        }

        function sendMsg() {
            const text = document.getElementById('msg-input').value;
            if (text.trim() === "") return;

            db.ref("messages").push({
                user: currentUser,
                text: text,
                timestamp: Date.now(),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            document.getElementById('msg-input').value = "";
        }

        function loadMessages() {
            db.ref("messages").orderByChild("timestamp").on("child_added", (snapshot) => {
                const data = snapshot.val();
                const isMe = data.user === currentUser;
                const msgHTML = `
                    <div class="flex flex-col ${isMe ? 'items-start' : 'items-end'}">
                        <div class="msg-bubble ${isMe ? 'msg-me shadow-md' : 'msg-them shadow-md'}">
                            <p class="text-[11px] font-bold mb-1 opacity-70">${data.user}</p>
                            <p class="leading-relaxed">${data.text}</p>
                            <p class="text-[9px] mt-1 text-right opacity-60">${data.time}</p>
                        </div>
                    </div>
                `;
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML += msgHTML;
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }

        function toggleLang() {
            currentLang = currentLang === "ar" ? "en" : "ar";
            document.body.dir = currentLang === "ar" ? "rtl" : "ltr";
            document.getElementById('lang-btn').innerText = currentLang === "ar" ? "EN" : "AR";
            document.getElementById('msg-input').placeholder = currentLang === "ar" ? "اكتب رسالة..." : "Type a message...";
        }

        // إرسال بالضغط على Enter
        document.getElementById('msg-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMsg();
        });
    </script>
</body>
</html>
