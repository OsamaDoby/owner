<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doby Chat | 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --queen-pink: #ff007f; }
        body { font-family: 'Cairo', sans-serif; height: 100dvh; margin: 0; display: flex; flex-direction: column; transition: 0.3s; overflow: hidden; }
        
        /* Dark Mode (Default) */
        body.dark { background: #050505; color: white; }
        body.dark .msg-container { background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%); }
        body.dark .header { background: #0a0a0a; border-bottom: 1px solid #333; }
        body.dark .input-bar { background: #111; border-top: 1px solid #333; }
        
        /* Light Mode */
        body.light { background: #f0f2f5; color: #1c1e21; }
        body.light .msg-container { background: #e5ddd5; }
        body.light .header { background: #008069; color: white; border-bottom: none; }
        body.light .input-bar { background: #f0f0f0; border-top: 1px solid #ddd; }
        body.light .king-msg { background: #d9fdd3; color: #111b21; border: 1px solid #b7e5b4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        body.light .queen-msg { background: #ffffff; color: #111b21; border: 1px solid #ddd; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }

        /* Bubbles */
        .msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 18px; font-size: 15px; animation: pop 0.2s ease; position: relative; }
        .king-msg { align-self: flex-start; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); }
        .queen-msg { align-self: flex-end; background: rgba(255, 0, 127, 0.1); border: 1px solid var(--queen-pink); }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .input-bar input { flex: 1; padding: 12px 20px; border-radius: 25px; outline: none; font-size: 16px; border: 1px solid #444; background: #222; color: white; }
        body.light .input-bar input { background: white; color: black; border: 1px solid #ccc; }
    </style>
</head>
<body class="dark">

    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center bg-black p-6">
        <div class="text-center w-full max-w-sm">
            <h1 style="font-family: 'Pacifico';" class="text-5xl text-cyan-400 mb-8 drop-shadow-[0_0_10px_#00f2ff]">Doby Chat</h1>
            <input type="password" id="secret-code" placeholder="أدخل كود المملكة السري" class="w-full p-4 rounded-full bg-transparent border-2 border-cyan-500 text-white text-center mb-4 outline-none">
            <button onclick="login()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-full transition-all">دخول</button>
        </div>
    </div>

    <header class="header p-3 flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <div id="main-avatar" class="w-10 h-10 rounded-full border border-cyan-500 flex items-center justify-center text-xl">👑</div>
            <div>
                <h2 id="display-name" class="font-bold text-sm">تحميل...</h2>
                <div class="flex items-center text-[9px]"><span id="partner-status" class="w-2 h-2 rounded-full bg-red-500 mr-1"></span> <span id="status-text">غير متصل</span></div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="clearChat()" class="p-2 text-xs bg-red-900/30 text-red-400 rounded-full border border-red-900/50">🧹 مسح</button>
            <button onclick="toggleTheme()" class="p-2 text-lg">🌓</button>
            <button onclick="logout()" class="p-2 text-sm bg-gray-800 rounded-full">🚪</button>
        </div>
    </header>

    <div id="chat-box" class="msg-container"></div>

    <div class="input-bar flex p-3 gap-2">
        <input type="text" id="msg-input" placeholder="اكتب رسالة..." autocomplete="off">
        <button onclick="sendMsg()" class="bg-cyan-600 p-3 rounded-full w-12 h-12 flex items-center justify-center shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-white"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsQcdlGauMHmut0xOuVD6oDld-E9xVl2E",
            databaseURL: "https://doby-chat-default-rtdb.firebaseio.com",
            projectId: "doby-chat",
            appId: "1:995153459605:web:47aada2c97ed95317f1e9c"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('doby_user') || "";
        const codes = { "1111": "الملك دوبي", "2222": "الملكة دوبي دوبي" };

        if(myName) login(true);

        function login(isAuto = false) {
            const val = isAuto ? "" : document.getElementById('secret-code').value;
            if (isAuto || codes[val]) {
                if(!isAuto) myName = codes[val];
                localStorage.setItem('doby_user', myName);
                const partnerName = myName === "الملك دوبي" ? "الملكة دوبي دوبي" : "الملك دوبي";
                document.getElementById('display-name').innerText = myName;
                document.getElementById('main-avatar').innerText = myName === "الملك دوبي" ? "🤴" : "👸";
                document.getElementById('login-screen').style.display = 'none';
                
                db.ref('status/' + myName).set("online");
                db.ref('status/' + myName).onDisconnect().set("offline");
                
                db.ref('status/' + partnerName).on('value', s => {
                    document.getElementById('partner-status').className = s.val() === "online" ? "w-2 h-2 rounded-full bg-green-500 mr-1" : "w-2 h-2 rounded-full bg-red-500 mr-1";
                    document.getElementById('status-text').innerText = s.val() === "online" ? partnerName + " متصلة" : partnerName + " بعيدة";
                });
                load();
            }
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;
            db.ref("messages").push({ u: myName, t: input.value, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}), ts: Date.now() });
            input.value = "";
            input.focus();
        }

        function load() {
            const box = document.getElementById('chat-box');
            db.ref("messages").on("value", snapshot => {
                box.innerHTML = "";
                snapshot.forEach(child => {
                    const d = child.val();
                    const isMe = d.u === myName;
                    box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-start' : 'items-end'} w-full">
                        <div class="bubble ${isMe ? 'king-msg' : 'queen-msg'}">
                            <p class="text-[9px] opacity-60 font-bold">${d.u}</p>
                            <p>${d.t}</p>
                            <p class="text-[8px] text-right opacity-40">${d.time}</p>
                        </div></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function toggleTheme() { document.body.classList.toggle('light'); document.body.classList.toggle('dark'); }
        
        function logout() { localStorage.removeItem('doby_user'); location.reload(); }

        function clearChat() {
            if(confirm("هل أنت متأكد من مسح جميع الذكريات (الرسائل)؟")) {
                db.ref("messages").remove();
            }
        }

        document.getElementById('msg-input').onkeypress = (e) => e.key === 'Enter' && sendMsg();
    </script>
</body>
</html>
